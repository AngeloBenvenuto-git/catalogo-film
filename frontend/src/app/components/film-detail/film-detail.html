<div class="container mt-4" *ngIf="film">
  <h2>{{ film.titolo }}</h2>
  <p><strong>Anno:</strong> {{ film.anno }}</p>
  <p><strong>Genere:</strong> {{ film.genere }}</p>
  <p><strong>Descrizione:</strong> {{ film.descrizione }}</p>
  <a routerLink="/" class="btn btn-secondary">← Torna alla lista</a>
</div>

<div class="container mt-4" *ngIf="!film">
  <p>Film non trovato.</p>
</div>
