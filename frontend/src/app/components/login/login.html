<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card">
        <div class="card-body">
          <h3 class="card-title text-center mb-4">🔐 Login</h3>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" [(ngModel)]="email" placeholder="Inserisci email">
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" [(ngModel)]="password" placeholder="Inserisci password">
          </div>
          <button class="btn btn-primary w-100" (click)="onLogin()">Accedi</button>
          <p class="text-center mt-3">Non hai un account? <a routerLink="/registrazione">Registrati</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
