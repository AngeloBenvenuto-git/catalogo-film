<div class="container mt-4">
  <h2 class="mb-4">🎬 Catalogo Film</h2>
  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let film of films">
      <div class="card h-100">
        <img *ngIf="film.posterUrl" [src]="film.posterUrl" class="card-img-top" alt="{{ film.titolo }}">
        <div class="card-body">
          <h5 class="card-title">{{ film.titolo }}</h5>
          <h6 class="card-subtitle mb-2 text-muted">{{ film.anno }} — {{ film.tipologia }}</h6>
          <p class="card-text">{{ film.generi?.join(', ') }}</p>
          <p class="card-text">⭐ {{ film.valutazione ?? 'N/D' }}</p>
          <a [routerLink]="['/films', film.id]" class="btn btn-primary">Dettagli</a>
        </div>
      </div>
    </div>
  </div>
</div>
