<div class="container mt-4">
  <h2 class="mb-4">🎬 Catalogo Film</h2>
  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let film of films">
      <div class="card h-100">
        <div class="card-body">
          <h5 class="card-title">{{ film.titolo }}</h5>
          <h6 class="card-subtitle mb-2 text-muted">{{ film.anno }} — {{ film.genere }}</h6>
          <p class="card-text">{{ film.descrizione }}</p>
          <a href="#" class="btn btn-primary">Dettagli</a>
        </div>
      </div>
    </div>
  </div>
</div>
