<div class="admin-page-container">
  <div class="container custom-container">

    <div class="header-section mb-4">
      <h2 class="admin-title">
        👑 Pannello Admin <span class="divider">—</span> <span class="subtitle">Gestione Utenti</span>
      </h2>
      <p class="text-white-50 small">Monitora gli accessi e gestisci i permessi della community</p>
    </div>

    <div *ngIf="errore" class="alert nf-alert">{{errore}}</div>

    <div class="search-wrapper mb-4">
      <i class="bi bi-search search-icon"></i>
      <input type="text"
             class="form-control admin-search-input"
             [(ngModel)]="ricerca"
             placeholder="Cerca per username o email...">
    </div>

    <div class="admin-card shadow-lg">
      <div class="table-responsive" style="overflow-x: auto;">
        <table class="table nf-table">
          <thead>
          <tr>
            <th>ID</th>
            <th>Utente</th>
            <th>Email</th>
            <th>Ruolo</th>
            <th>Stato</th>
            <th class="text-end px-4">Azioni</th>
          </tr>
          </thead>
          <tbody>
          <tr *ngFor="let utente of utentiFiltrati" class="align-middle">
            <td class="userid-cell">#{{utente.id}}</td>
            <td class="username-cell">{{utente.username}}</td>
            <td class="email-cell">{{utente.email}}</td>
            <td>
                <span class="badge-premium" [ngClass]="'role-' + utente.ruolo.toLowerCase()">
                  {{utente.ruolo}}
                </span>
            </td>
            <td>
              <div class="status-indicator" [ngClass]="utente.bannato ? 'status-banned' : 'status-active'">
                <span class="status-dot"></span>
                {{utente.bannato ? 'Bannato' : 'Attivo'}}
              </div>
            </td>

            <td class="text-end px-4">
              <div class="btn-group-premium">

                <button *ngIf="utente.ruolo !== 'ADMIN' && !utente.bannato"
                        class="btn-action-premium promuovi"
                        (click)="promuovi(utente.id)">
                  <i class="bi bi-arrow-up-circle"></i>
                  <span>Promuovi</span>
                </button>

                <button *ngIf="!utente.bannato && utente.ruolo !== 'ADMIN'"
                        class="btn-action-premium banna"
                        (click)="banna(utente.id)">
                  <i class="bi bi-slash-circle"></i>
                  <span>Banna</span>
                </button>

                <button *ngIf="utente.bannato"
                        class="btn-action-premium sbanna"
                        (click)="sbanna(utente.id)">
                  <i class="bi bi-check-circle"></i>
                  <span>Sblocca</span>
                </button>

                <button *ngIf="utente.ruolo !== 'ADMIN'"
                        class="btn-action-premium elimina"
                        (click)="elimina(utente.id)">
                  <i class="bi bi-trash3"></i>
                  <span>Elimina</span>
                </button>

              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
