<div class="container-fluid mt-5 px-5">
  <h2 class="text-white mb-4">🎬 Film Preferiti</h2>

  <div class="row g-4" *ngIf="filmsCompleti.length > 0; else emptyFilms">
    <div class="col-6 col-md-4 col-lg-2" *ngFor="let film of filmsCompleti">
      <div class="movie-card" (click)="openFilm(film.id)">
        <img [src]="film.posterUrl" class="img-fluid rounded shadow" [alt]="film.titolo">
        <div class="movie-overlay">
          <div class="overlay-content">
            <h6 class="m-0">{{ film.titolo }}</h6>
            <div class="small mt-1">
              <span class="text-success">{{ film.valutazione }} ★</span>
              <span class="ms-2">{{ film.anno }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <ng-template #emptyFilms>
    <p class="text-muted fs-5">Nessun film salvato.</p>
  </ng-template>

  <!-- LISTE LIKED -->
  <h2 class="text-white mt-5 mb-4">❤️ Liste che mi piacciono</h2>

  <div class="row g-4" *ngIf="listeLiked.length > 0; else emptyListe">
    <div class="col-md-4" *ngFor="let lista of listeLiked">
      <div class="card bg-dark border-secondary p-3 h-100">
        <h5 class="text-white mb-1">{{ lista.titolo }}</h5>
        <p class="text-white-50 small mb-2">di &#64;{{ lista.usernameRedattore }}</p>
        <p class="text-white-50 small">{{ lista.descrizione || 'Nessuna descrizione.' }}</p>
        <div class="mt-2">
          <div *ngFor="let t of lista.titoliFilm | slice:0:3" class="text-white-50 small">
            🎬 {{ t }}
          </div>
        </div>
        <span class="text-danger mt-2 small">❤️ {{ lista.numeroLike }} like</span>
      </div>
    </div>
  </div>

  <ng-template #emptyListe>
    <p class="text-muted fs-5">Nessuna lista salvata.</p>
  </ng-template>

  <div class="text-center mt-5">
    <button class="btn btn-outline-light mt-2" (click)="goBack()">Torna al Catalogo</button>
  </div>
</div>
