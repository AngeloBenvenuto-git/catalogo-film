<div class="profile-page-container">
  <div class="profile-card">


    <div class="profile-header text-center mb-4">
      <div class="mb-2">
        <i class="bi bi-shield-lock-fill text-danger fs-1"></i>
      </div>
      <h2 class="text-white">Impostazioni Account</h2>
      <p class="text-white-50">Gestisci la tua identità digitale su NetFilm</p>
    </div>

    <div class="avatar-section text-center my-4">
      <div class="avatar-wrapper">
        <img [src]="avatarPreview || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'"
             alt="Avatar" class="profile-img shadow">
        <label for="avatarUpload" class="edit-btn">
          <i class="bi bi-camera-fill"></i>
        </label>
        <input type="file" id="avatarUpload" (change)="onFileSelected($event)" hidden
               accept="image/png, image/jpeg, image/jpg, image/webp">
      </div>
    </div>

    <div class="profile-details">
      <div class="info-group mb-3">
        <label class="small text-secondary fw-bold text-uppercase">Email (Sola Lettura)</label>
        <div class="info-value email-locked">{{ email }}</div>
      </div>

      <div class="info-group mb-3">
        <label class="small text-danger fw-bold text-uppercase">Username</label>
        <input type="text" class="form-control profile-input" [(ngModel)]="username" placeholder="Inserisci il tuo nome utente">
      </div>

      <hr class="border-secondary my-4">

      <div class="info-group mb-3">
        <label class="small text-danger fw-bold text-uppercase">Nuova Password</label>
        <input type="password" class="form-control profile-input"
               [(ngModel)]="nuovaPassword" placeholder="Lascia vuoto per non cambiare">
      </div>

      <div class="info-group mb-4">
        <label class="small text-danger fw-bold text-uppercase">Conferma Password</label>
        <input type="password" class="form-control profile-input"
               [(ngModel)]="confermaPassword" placeholder="Ripeti la nuova password">
      </div>

      <div class="actions mt-4">
        <button class="btn btn-danger w-100 mb-2 py-2 fw-bold" (click)="salvaProfilo()">
          <i class="bi bi-save2 me-2"></i> SALVA MODIFICHE
        </button>
        <button class="btn btn-outline-secondary w-100" routerLink="/">
          ANNULLA
        </button>
      </div>
    </div>
  </div>
</div>

<div class="nf-toast" [class.show]="showToast">
  <div class="nf-toast-content">
    <i class="bi bi-check-circle-fill me-2 fs-5"></i>
    <span>{{ toastMessage }}</span>
  </div>
</div>
