<div class="contact-page-container">

  <div class="toast-notification" [class.show]="showToast" [class.error]="isError">
    {{ toastMessage }}
  </div>

  <div class="contact-card">
    <div class="contact-header">
      <div class="icon-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 16 16">
          <path d="M.05 3.555A2 2 0 0 1 2 2h12a2 2 0 0 1 1.95 1.555L8 8.414.05 3.555ZM0 4.697v7.104l5.803-3.558L0 4.697ZM6.761 8.83l-6.57 4.027A2 2 0 0 0 2 14h12a2 2 0 0 0 1.808-1.144l-6.57-4.027L8 9.586l-1.239-.757Zm3.436-.586L16 11.801V4.697l-5.803 3.546Z"/>
        </svg>
      </div>
      <h1 class="contact-title">Contattaci</h1>
      <p class="contact-subtitle">Hai un problema o un suggerimento? Scrivici!</p>
    </div>

    <form (ngSubmit)="inviaMessaggio()" class="contact-form">
      <div class="form-group">
        <label for="oggetto">Oggetto</label>
        <input
          type="text"
          id="oggetto"
          name="oggetto"
          [(ngModel)]="oggetto"
          placeholder="Es. Problema di riproduzione, Richiesta film..."
          autocomplete="off">
      </div>

      <div class="form-group">
        <label for="testo">Messaggio</label>
        <textarea
          id="testo"
          name="testo"
          [(ngModel)]="testo"
          placeholder="Descrivi qui il tuo problema o suggerimento..."
          rows="5">
        </textarea>
      </div>

      <button type="submit" class="btn-submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Invio in corso...' : 'Invia Messaggio' }}
      </button>
    </form>
  </div>
</div>
